<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'">
    <title>ETC Equipment ID Fixer</title>
    <style>
:root {
    --primary: #1f7a68;
    --primary-dark: #15584b;
    --accent: #bc5b2c;
    --bg: #f5f6f2;
    --surface: #ffffff;
    --text: #25302d;
    --muted: #66736f;
    --line: #d8dfdc;
    --ok: #18784c;
    --warn: #9a6400;
    --error: #b3261e;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100dvh;
    padding: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, Arial, sans-serif;
    line-height: 1.45;
    -webkit-text-size-adjust: 100%;
    touch-action: manipulation;
}

body[data-layout-mode="phone"] {
    --mode-card-padding: 16px;
}

body[data-layout-mode="laptop"] {
    --mode-card-padding: 18px;
}

.container {
    max-width: 860px;
    margin: 0 auto;
    padding-bottom: 18px;
}

header {
    text-align: center;
    margin: 4px 0 16px;
}

h1 {
    display: inline-block;
    margin: 0 0 6px;
    padding-bottom: 6px;
    border-bottom: 3px solid var(--primary);
    color: #1e3630;
    font-size: 1.55rem;
    font-weight: 750;
    letter-spacing: 0;
}

header p {
    margin: 0;
    color: var(--muted);
    font-size: 0.92rem;
}

.card {
    margin-bottom: 14px;
    padding: var(--mode-card-padding, 16px);
    background: var(--surface);
    border: 1px solid #e7ecea;
    border-radius: 8px;
    box-shadow: 0 3px 10px rgba(24, 42, 36, 0.05);
}

h2 {
    margin: 0 0 14px;
    padding-bottom: 9px;
    border-bottom: 1px solid #edf0ef;
    color: #35423f;
    font-size: 1.05rem;
    letter-spacing: 0;
}

h3 {
    margin: 2px 0 10px;
    color: #35423f;
    font-size: 0.98rem;
    letter-spacing: 0;
}

.form-group {
    margin-bottom: 14px;
}

label {
    display: block;
    margin-bottom: 6px;
    color: #48544f;
    font-size: 0.94rem;
    font-weight: 650;
    user-select: none;
}

input[type="text"] {
    width: 100%;
    min-height: 48px;
    padding: 11px 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fbfcfb;
    color: var(--text);
    font-size: 16px;
}

input[type="file"] {
    width: 100%;
    min-height: 54px;
    padding: 14px;
    border: 2px dashed var(--primary);
    border-radius: 8px;
    background: #eef8f5;
    font-size: 0.95rem;
}

input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(31, 122, 104, 0.16);
    outline: none;
}

input[type="checkbox"],
input[type="radio"] {
    width: 22px;
    height: 22px;
    margin: 0 8px 0 0;
    accent-color: var(--primary);
    vertical-align: middle;
}

.grid-2 {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
}

.segmented {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 14px;
}

.segmented label {
    position: relative;
    margin: 0;
}

.segmented span {
    display: flex;
    min-height: 46px;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #f8faf9;
    color: #45514d;
}

.segmented input {
    position: absolute;
    opacity: 0;
    pointer-events: none;
}

.segmented input:checked + span {
    border-color: var(--primary);
    background: #e8f5f1;
    color: var(--primary-dark);
}

.layout-toggle {
    max-width: 360px;
    margin: 12px auto 0;
}

.switch-row {
    display: grid;
    gap: 9px;
    margin-bottom: 14px;
}

.switch-row label {
    display: flex;
    min-height: 36px;
    align-items: center;
    margin: 0;
}

.summary-box {
    min-height: 42px;
    margin-bottom: 12px;
    padding: 10px 12px;
    border: 1px solid #d7e5df;
    border-radius: 8px;
    background: #f2faf6;
    color: #315e4d;
    font-size: 0.9rem;
}

.inline-actions {
    display: flex;
    justify-content: flex-start;
    margin: 0 0 10px;
}

.inline-actions button {
    width: auto;
    min-height: 42px;
    padding: 10px 12px;
    font-size: 0.9rem;
}

.tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
}

.tab-button {
    min-height: 44px;
    padding: 10px 12px;
    border: 1px solid var(--line);
    background: #f8faf9;
    color: #45514d;
    box-shadow: none;
    font-size: 0.92rem;
}

.tab-button.active {
    border-color: var(--primary);
    background: #e8f5f1;
    color: var(--primary-dark);
}

.diagram-grid {
    display: grid;
    gap: 10px;
}

.machine-block {
    border: 1px solid #dfe7e4;
    border-radius: 8px;
    background: #fbfcfb;
    overflow: hidden;
}

.machine-block-header {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 10px;
    align-items: start;
    width: 100%;
    padding: 10px 12px;
    border: 0;
    border-bottom: 1px solid #edf0ef;
    background: #f4f8f6;
    color: inherit;
    box-shadow: none;
    text-align: left;
    cursor: pointer;
    font: inherit;
}

.diagram-toggle,
.diagram-toggle:nth-child(2) {
    background: #f4f8f6;
    color: inherit;
    box-shadow: none;
}

.diagram-toggle::before {
    content: "v";
    color: var(--primary-dark);
    font-size: 0.95rem;
    font-weight: 900;
    line-height: 1.2;
    transform: translateY(1px);
}

.diagram-toggle[aria-expanded="false"]::before {
    content: ">";
}

.diagram-toggle:active {
    transform: none;
}

.diagram-toggle:hover {
    background: #edf6f2;
}

.machine-title {
    min-width: 0;
    font-weight: 750;
    overflow-wrap: anywhere;
}

.machine-counts {
    color: var(--muted);
    font-size: 0.8rem;
    white-space: nowrap;
}

.equipment-flow {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 10px 12px 12px;
}

.section-block {
    border-top: 1px solid #edf0ef;
}

.section-block:first-of-type {
    border-top: 0;
}

.section-header {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 8px;
    align-items: center;
    width: 100%;
    padding: 8px 12px 0;
    border: 0;
    background: transparent;
    color: inherit;
    box-shadow: none;
    text-align: left;
    cursor: pointer;
    font: inherit;
}

.section-header.diagram-toggle,
.section-header.diagram-toggle:nth-child(2) {
    background: transparent;
    color: inherit;
    box-shadow: none;
}

.section-header.diagram-toggle:hover {
    background: #f8faf9;
}

.section-title {
    color: #40504b;
    font-size: 0.84rem;
    font-weight: 750;
    overflow-wrap: anywhere;
}

.section-counts {
    color: var(--muted);
    font-size: 0.76rem;
    white-space: nowrap;
}

.equipment-chip {
    display: inline-flex;
    max-width: 100%;
    align-items: center;
    gap: 5px;
    padding: 5px 7px;
    border: 1px solid #d7e1dd;
    border-radius: 8px;
    background: #ffffff;
    color: #33433e;
    font-family: Consolas, "Courier New", monospace;
    font-size: 0.78rem;
    overflow-wrap: anywhere;
}

.equipment-chip.placeholder {
    border-color: #d9aa42;
    background: #fff7df;
    color: #6f4b00;
    font-weight: 700;
}

.equipment-chip.candidate {
    box-shadow: inset 0 -2px 0 rgba(31, 122, 104, 0.28);
}

.equipment-chip.replaced {
    border-color: #1b8f57;
    background: #e6f7ec;
    color: #14633e;
    font-weight: 800;
    box-shadow: inset 0 -2px 0 rgba(27, 143, 87, 0.38);
}

.equipment-chip.replaced .chip-dbno {
    color: #23734d;
}

.chip-dbno {
    color: var(--muted);
    font-size: 0.72rem;
}

.empty-machine {
    padding: 10px 12px 12px;
    color: var(--muted);
    font-size: 0.84rem;
}

.action-row {
    display: grid;
    grid-template-columns: 1fr;
    gap: 9px;
    position: sticky;
    bottom: calc(8px + env(safe-area-inset-bottom));
    z-index: 2;
    margin-top: 10px;
    padding-top: 10px;
    background: linear-gradient(to bottom, rgba(255, 255, 255, 0.88), var(--surface) 36%);
}

.download-links-panel {
    margin-top: 10px;
    padding: 10px;
    border: 1px solid #d7e5df;
    border-radius: 8px;
    background: #f2faf6;
}

.download-links {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
}

.download-link {
    display: flex;
    min-height: 44px;
    align-items: center;
    justify-content: center;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #ffffff;
    color: var(--primary-dark);
    font-weight: 750;
    text-align: center;
    text-decoration: none;
    overflow-wrap: anywhere;
}

.download-link:focus-visible {
    outline: 3px solid rgba(31, 122, 104, 0.24);
    outline-offset: 2px;
}

button {
    width: 100%;
    min-height: 52px;
    padding: 13px 14px;
    border: 0;
    border-radius: 8px;
    background: var(--primary);
    color: #fff;
    box-shadow: 0 2px 5px rgba(31, 122, 104, 0.25);
    cursor: pointer;
    font-size: 1rem;
    font-weight: 700;
}

button:nth-child(2) {
    background: var(--accent);
    box-shadow: 0 2px 5px rgba(188, 91, 44, 0.22);
}

button:active {
    transform: scale(0.99);
}

button:focus-visible {
    outline: 3px solid rgba(31, 122, 104, 0.24);
    outline-offset: 2px;
}

button:disabled {
    cursor: not-allowed;
    opacity: 0.56;
    transform: none;
}

.tabs .tab-button,
.tabs .tab-button:nth-child(2) {
    min-height: 44px;
    border: 1px solid var(--line);
    background: #f8faf9;
    color: #45514d;
    box-shadow: none;
    font-size: 0.92rem;
}

.tabs .tab-button.active,
.tabs .tab-button.active:nth-child(2) {
    border-color: var(--primary);
    background: #e8f5f1;
    color: var(--primary-dark);
}

.table-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
}

table {
    width: 100%;
    min-width: 760px;
    border-collapse: collapse;
    font-size: 0.86rem;
}

th,
td {
    padding: 9px 8px;
    border-bottom: 1px solid #edf0ef;
    text-align: left;
    vertical-align: top;
}

th {
    color: #4c5a55;
    font-weight: 750;
}

.machine-table {
    min-width: 0;
    margin-bottom: 14px;
}

.machine-table input[type="text"] {
    min-height: 40px;
    padding: 8px 9px;
    font-size: 15px;
}

.machine-table input[type="checkbox"] {
    margin-right: 0;
}

.machine-name {
    font-weight: 700;
}

.machine-section-row td {
    border-bottom: 0;
    background: #fbfcfb;
}

.machine-section-row + .machine-groups-row td {
    padding-top: 0;
}

.machine-meta {
    display: block;
    color: var(--muted);
    font-size: 0.8rem;
    font-weight: 500;
}

.range-group-count {
    max-width: 86px;
}

.range-groups {
    display: grid;
    gap: 7px;
    max-width: 100%;
}

.range-group {
    display: grid;
    grid-template-columns: 42px minmax(70px, 0.75fr) minmax(116px, 1.2fr) minmax(70px, 0.7fr) minmax(100px, 1fr);
    gap: 6px;
    align-items: end;
    padding: 8px;
    border: 1px solid #dfe7e4;
    border-radius: 8px;
    background: #ffffff;
}

.range-group label {
    margin: 0;
    color: var(--muted);
    font-size: 0.72rem;
    font-weight: 700;
}

.range-group input[type="text"] {
    min-height: 38px;
    padding: 7px 8px;
    font-size: 15px;
}

.range-use {
    display: flex;
    min-height: 38px;
    align-items: center;
    justify-content: center;
}

.range-use input[type="checkbox"] {
    margin: 0;
}

.range-field {
    min-width: 0;
}

.range-preview {
    min-height: 38px;
    padding: 8px;
    border: 1px solid #edf0ef;
    border-radius: 8px;
    background: #f8faf9;
    color: #45514d;
    font-family: Consolas, "Courier New", monospace;
    font-size: 0.76rem;
    overflow-wrap: anywhere;
}

.status-ok {
    color: var(--ok);
    font-weight: 700;
}

.status-warn {
    color: var(--warn);
    font-weight: 700;
}

.status-error {
    color: var(--error);
    font-weight: 700;
}

#log {
    height: clamp(160px, 28dvh, 250px);
    overflow-y: auto;
    padding: 12px;
    border-radius: 8px;
    background: #263531;
    color: #eef4f1;
    font-family: Consolas, "Courier New", monospace;
    font-size: 0.82rem;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
    scrollbar-width: thin;
}

.log-ok { color: #72d39f; font-weight: 700; }
.log-warn { color: #ffd36a; font-weight: 700; }
.log-error { color: #ff8a80; font-weight: 700; }
[hidden] { display: none !important; }
.hidden { display: none; }

@media (min-width: 900px) {
    body[data-layout-mode="laptop"] .container {
        display: grid;
        grid-template-columns: minmax(320px, 430px) minmax(0, 1fr);
        gap: 14px;
        max-width: 1320px;
    }

    body[data-layout-mode="laptop"] header {
        grid-column: 1 / -1;
        margin-bottom: 2px;
    }

    body[data-layout-mode="laptop"] .card {
        margin-bottom: 0;
    }

    body[data-layout-mode="laptop"] section.card:nth-of-type(1),
    body[data-layout-mode="laptop"] section.card:nth-of-type(2) {
        grid-column: 1;
    }

    body[data-layout-mode="laptop"] section.card:nth-of-type(3) {
        grid-column: 2;
        grid-row: 2 / span 2;
    }

    body[data-layout-mode="laptop"] section.card:nth-of-type(4) {
        grid-column: 1 / -1;
    }

    body[data-layout-mode="laptop"] .action-row {
        position: static;
    }

    body[data-layout-mode="laptop"] .diagram-grid {
        max-height: 62dvh;
        overflow-y: auto;
        padding-right: 4px;
        scrollbar-width: thin;
    }

    body[data-layout-mode="laptop"] .machine-table input[type="text"] {
        min-height: 36px;
    }

    body[data-layout-mode="laptop"] #log {
        height: 190px;
    }
}

@media (min-width: 620px) {
    .grid-2 {
        grid-template-columns: 1fr 1fr;
    }

    .switch-row {
        grid-template-columns: 1fr 1fr 1fr;
    }

    .action-row {
        grid-template-columns: 1fr 1fr 1fr;
    }

    .download-links {
        grid-template-columns: 1fr 1fr;
    }
}

@media (max-width: 620px) {
    .range-group {
        grid-template-columns: 38px minmax(58px, 0.7fr) minmax(92px, 1fr) minmax(58px, 0.65fr);
    }

    .range-field.range-preview-field {
        grid-column: 2 / -1;
    }
}

@media (max-width: 420px) {
    body {
        padding: 10px;
    }

    .card {
        padding: 14px;
    }

    h1 {
        font-size: 1.34rem;
    }
}
    </style>
</head>
<body data-layout-mode="phone">
    <main class="container">
        <header>
            <h1>ETC Equipment ID Fixer</h1>
            <p>ELECTRICALEQUIPMENT id/txt</p>
            <div class="layout-toggle segmented" role="radiogroup" aria-label="Layout mode">
                <label>
                    <input type="radio" name="layoutMode" value="phone" checked>
                    <span>Phone</span>
                </label>
                <label>
                    <input type="radio" name="layoutMode" value="laptop">
                    <span>Laptop</span>
                </label>
            </div>
        </header>

        <section class="card">
            <h2>1. File</h2>
            <div class="form-group">
                <label for="fileInput">ETC file</label>
                <input type="file" id="fileInput" accept=".etc,.xml,.txt">
            </div>
            <div id="fileSummary" class="summary-box" aria-live="polite">No file selected.</div>
        </section>

        <section class="card">
            <h2>2. Replacement</h2>

            <input id="startNumber" type="hidden">
            <input id="numberStep" type="hidden" value="1">
            <input id="quantity" type="hidden">
            <input id="suffix" type="hidden" value="_fixed">
            <input id="useDbnoStart" type="checkbox" class="hidden">
            <input id="startDbno" type="text" class="hidden" inputmode="numeric" autocomplete="off" spellcheck="false">
            <input id="useMachineRanges" type="checkbox" class="hidden" checked>

            <div class="switch-row">
                <label>
                    <input type="checkbox" id="onlyA" checked>
                    <span>Only replace id/txt with A/a</span>
                </label>
                <label>
                    <input type="checkbox" id="onlyMesspunkt" checked>
                    <span>Only type = Messpunkt</span>
                </label>
            </div>

            <div id="machineRangesPanel">
                <h3>Machine ranges</h3>
                <div id="machineSummary" class="summary-box" aria-live="polite">No file selected.</div>
                <div class="table-wrap">
                    <table class="machine-table">
                        <thead>
                            <tr>
                                <th>Machine / section</th>
                                <th>Matches</th>
                                <th>Groups</th>
                            </tr>
                        </thead>
                        <tbody id="machineBody">
                            <tr><td colspan="3">No machine data.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="runSummary" class="summary-box" aria-live="polite">Ready to preview.</div>

            <div class="action-row">
                <button id="previewBtn" type="button">Preview</button>
                <button id="applyBtn" type="button">Replace</button>
                <button id="downloadBtn" type="button" disabled>Download + Log</button>
            </div>
            <div id="downloadLinksPanel" class="download-links-panel hidden" aria-live="polite">
                <div id="downloadLinks" class="download-links"></div>
            </div>
        </section>

        <section class="card">
            <h2>3. Review</h2>
            <div class="tabs" role="tablist" aria-label="Review views">
                <button id="diagramTab" class="tab-button active" type="button" role="tab" aria-selected="true" aria-controls="diagramPanel">Machine Diagram</button>
                <button id="previewTab" class="tab-button" type="button" role="tab" aria-selected="false" aria-controls="previewPanel">Preview Table</button>
            </div>

            <div id="diagramPanel" class="tab-panel" role="tabpanel" aria-labelledby="diagramTab">
                <div id="diagramSummary" class="summary-box" aria-live="polite">No file selected.</div>
                <div id="machineDiagram" class="diagram-grid" aria-live="polite"></div>
            </div>

            <div id="previewPanel" class="tab-panel hidden" role="tabpanel" aria-labelledby="previewTab">
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>dbno</th>
                                <th>machine / section</th>
                                <th>id</th>
                                <th>txt</th>
                                <th>new</th>
                                <th>status</th>
                            </tr>
                        </thead>
                        <tbody id="previewBody">
                            <tr><td colspan="6">No data.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <section class="card">
            <h2>Log</h2>
            <div id="log" aria-live="polite"></div>
        </section>
    </main>

    <script>
const MAX_INPUT_FILE_SIZE_BYTES = 20 * 1024 * 1024;
const SUPPORTED_EXTENSIONS = new Set(["etc", "xml", "txt"]);
const LOG_MAX_LINES = 300;
const SAFE_SUFFIX_PATTERN = /^[A-Za-z0-9._-]{0,40}$/;
const UNSAFE_FILENAME_CHARS = /[<>:"/\\|?*\x00-\x1F]/g;

function getFileExtension(fileName) {
    const parts = String(fileName || "").split(".");
    return parts.length > 1 ? parts.pop().toLowerCase() : "";
}

function formatBytes(bytes) {
    if (!Number.isFinite(bytes) || bytes < 0) return "0 B";
    if (bytes < 1024) return `${bytes} B`;
    const kb = bytes / 1024;
    if (kb < 1024) return `${kb.toFixed(1)} KB`;
    return `${(kb / 1024).toFixed(1)} MB`;
}

function isSupportedFile(file) {
    return !!file && SUPPORTED_EXTENSIONS.has(getFileExtension(file.name));
}

function isSafeOutputSuffix(value) {
    return SAFE_SUFFIX_PATTERN.test(String(value || ""));
}

function readFileAsText(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = event => resolve(String(event.target.result || ""));
        reader.onerror = () => reject(reader.error || new Error("Read failed"));
        reader.readAsText(file);
    });
}

function makeDownloadName(fileName, suffix) {
    const safeSuffix = isSafeOutputSuffix(suffix) ? String(suffix || "") : "_fixed";
    const name = sanitizeDownloadFileName(fileName || "output.etc");

function scanEquipment(text) {

    const sectionStack = [];

                messpunktPlaceholders: 0,
                candidates: 0
            });

            sectionMap.set(section.key, {
                machine,
                section,
                total: 0,
                messpunkt: 0,
                placeholders: 0,
                messpunktPlaceholders: 0,
                candidates: 0
            });

function getMachineDiagramData(text, rawSettings = {}) {

        return { ok: false, reason: "missing id/txt" };
    }
    if (settings.onlyA && !hasAPlaceholder(attrs)) {
        return { ok: false, reason: "id/txt has no A placeholder" };
    }
    if (settings.useDbnoStart && attrs.dbno === undefined) {
        return { ok: false, reason: "missing dbno" };
    }

    const dbno = attrs.dbno === undefined ? null : parseStrictNonNegativeInteger(attrs.dbno);
    if (settings.useDbnoStart && dbno === null) {
        return { ok: false, reason: "dbno is not a whole number" };
    }

    if (settings.mode === "single" && dbno !== settings.startDbno) {
        return { ok: false, reason: "different dbno" };
    }
    if (settings.mode === "batch" && settings.useDbnoStart && dbno < settings.startDbno) {

    const replacements = [];
    const warnings = [];
    const tagRe = /<ELECTRICALEQUIPMENT\b[^>]*>/g;

        const tag = match[0];

        const candidate = shouldConsiderTag(attrs, settings);
        if (!candidate.ok) continue;

        const newValue = incrementDigitString(settings.startNumber, accepted, settings.numberStep);
        const row = {
            dbno: attrs.dbno || "",
            oldId: attrs.id || "",
            oldTxt: attrs.txt || "",
            newValue,
            status: "will be replaced",
            ok: true
        };
        rows.push(row);

        let nextTag = replaceAttribute(tag, "id", newValue);
        nextTag = replaceAttribute(nextTag, "txt", newValue);
        replacements.push({
            start: match.index,
            end: match.index + tag.length,
            oldTag: tag,
            newTag: nextTag,
            row
        });
        accepted++;
    }

    if (settings.mode === "batch" && replacements.length > 0 && replacements.length < settings.quantity) {
        warnings.push(`Only ${replacements.length} matching equipment tags were found for the requested quantity ${settings.quantity}.`);
    }

    if (rows.length === 0) {
        rows.push({
            dbno: "-",
            oldId: "-",
            oldTxt: "-",
            newValue: "-",
            status: "no matches",
            ok: false
        });
    }

    return { settings, rows, replacements, warnings, errors: [] };

function readMachineSettings(rawSettings = {}) {
    const onlyA = rawSettings.onlyA !== false;
    const onlyMesspunkt = rawSettings.onlyMesspunkt !== false;
    const ranges = Array.isArray(rawSettings.machineRanges) ? rawSettings.machineRanges : [];
    const errors = [];
    const machineRanges = [];

    for (const range of ranges) {
        if (!range || range.enabled === false) continue;
        const key = String(range.machineKey || "");
        const sectionKey = String(range.sectionKey || "");
        const startNumber = String(range.startNumber || "").trim();
        const numberStep = parseStrictPositiveInteger(range.numberStep);
        const limitText = range.limit === undefined || range.limit === null ? "" : String(range.limit).trim();
        const limit = limitText === "" ? null : parseStrictPositiveInteger(limitText);
        const rangeIndex = parseStrictNonNegativeInteger(range.rangeIndex);
        const machineLabel = String(range.machineLabel || key);
        const sectionLabel = String(range.sectionLabel || sectionKey || "All sections");
        const rangeLabel = String(range.rangeLabel || `Group ${rangeIndex === null ? machineRanges.length + 1 : rangeIndex + 1}`);

        if (!key) errors.push("Machine range is missing a machine key.");
        if (!/^\d+$/.test(startNumber)) errors.push(`Start number is required for ${cleanExportLogValue(sectionLabel)} ${cleanExportLogValue(rangeLabel)}.`);
        if (startNumber.length > MAX_START_NUMBER_DIGITS) errors.push(`Start number must be at most ${MAX_START_NUMBER_DIGITS} digits for ${cleanExportLogValue(sectionLabel)} ${cleanExportLogValue(rangeLabel)}.`);
        if (numberStep === null) errors.push(`Number step must be a positive whole number for ${cleanExportLogValue(sectionLabel)} ${cleanExportLogValue(rangeLabel)}.`);
        if (numberStep !== null && numberStep > MAX_NUMBER_STEP) errors.push(`Number step must not exceed ${MAX_NUMBER_STEP} for ${cleanExportLogValue(sectionLabel)} ${cleanExportLogValue(rangeLabel)}.`);
        if (limitText !== "" && limit === null) errors.push(`Count must be a positive whole number or blank for ${cleanExportLogValue(sectionLabel)} ${cleanExportLogValue(rangeLabel)}.`);
        if (limit !== null && limit > MAX_REPLACEMENTS) errors.push(`Count must not exceed ${MAX_REPLACEMENTS} for ${cleanExportLogValue(sectionLabel)} ${cleanExportLogValue(rangeLabel)}.`);

        machineRanges.push({
            machineKey: key,
            sectionKey,
            machineLabel,
            sectionLabel,
            rangeLabel,
            rangeIndex: rangeIndex === null ? machineRanges.length : rangeIndex,
            limit,
            startNumber,
            numberStep,
            enabled: true
        });
    }

    if (machineRanges.length === 0) {
        errors.push("Enable at least one machine range.");
    }

    return {
        mode: "machine",
        onlyA,
        onlyMesspunkt,
        machineRanges,
        errors
    };
}

function buildMachinePlan(text, rawSettings = {}) {
    const settings = readMachineSettings(rawSettings);
    if (settings.errors.length > 0) {
        return { settings, rows: [], replacements: [], warnings: [], errors: settings.errors };

    const scan = scanEquipment(text);
    const rangesBySection = new Map();
    const fallbackRangesByMachine = new Map();
    for (const range of settings.machineRanges) {
        const map = range.sectionKey ? rangesBySection : fallbackRangesByMachine;
        const key = range.sectionKey ? `${range.machineKey}|${range.sectionKey}` : range.machineKey;
        if (!map.has(key)) map.set(key, []);
        map.get(key).push(range);
    }
    for (const ranges of [...rangesBySection.values(), ...fallbackRangesByMachine.values()]) {
        ranges.sort((left, right) => left.rangeIndex - right.rangeIndex);
    }
    const sectionCounters = new Map();
    const rangeCounters = new Map();
    const sectionCandidateTotals = new Map();
    const sectionReplacementTotals = new Map();
    const groupLabels = new Map();
    const rows = [];
    const replacements = [];
    const warnings = [];
    const candidateSettings = {
        onlyA: settings.onlyA,
        onlyMesspunkt: settings.onlyMesspunkt,
        mode: "batch",
        useDbnoStart: false

    for (const item of scan.items) {
        const candidate = shouldConsiderTag(item.attrs, candidateSettings);

        const sectionKey = `${item.machine.key}|${item.section.key}`;
        const hasSectionRanges = rangesBySection.has(sectionKey);
        const groupKey = hasSectionRanges ? sectionKey : item.machine.key;
        const ranges = hasSectionRanges ? rangesBySection.get(sectionKey) : fallbackRangesByMachine.get(item.machine.key) || [];
        if (ranges.length === 0) continue;

        const sectionOffset = sectionCounters.get(groupKey) || 0;
        sectionCandidateTotals.set(groupKey, (sectionCandidateTotals.get(groupKey) || 0) + 1);
        groupLabels.set(groupKey, hasSectionRanges ? getSectionTitle(item.section) : getMachineTitle(item.machine));
        const range = findRangeForOffset(ranges, sectionOffset);
        sectionCounters.set(groupKey, sectionOffset + 1);
        if (!range) continue;

        const rangeKey = `${groupKey}|${range.rangeIndex}`;
        const rangeOffset = rangeCounters.get(rangeKey) || 0;
        const newValue = incrementDigitString(range.startNumber, rangeOffset, range.numberStep);
        const machineTitle = getMachineTitle(item.machine);
        const sectionTitle = getSectionTitle(item.section);
        const row = {
            machineKey: item.machine.key,
            machine: machineTitle,
            sectionKey: item.section.key,
            section: sectionTitle,
            range: range.rangeLabel,
            dbno: item.attrs.dbno || "",
            oldId: item.attrs.id || "",
            oldTxt: item.attrs.txt || "",
            newValue,
            status: "will be replaced",
            ok: true
        };
        rows.push(row);

        let nextTag = replaceAttribute(item.tag, "id", newValue);
        nextTag = replaceAttribute(nextTag, "txt", newValue);
        replacements.push({
            start: item.start,
            end: item.end,
            oldTag: item.tag,
            newTag: nextTag,
            row
        });
        if (replacements.length > MAX_REPLACEMENTS) {
            return {
                settings,
                rows: [],
                replacements: [],
                warnings: [],
                errors: [`Machine range replacements must not exceed ${MAX_REPLACEMENTS}.`]
            };
        }
        rangeCounters.set(rangeKey, rangeOffset + 1);
        sectionReplacementTotals.set(groupKey, (sectionReplacementTotals.get(groupKey) || 0) + 1);
    }

    for (const range of settings.machineRanges) {
        const rangeGroupKey = range.sectionKey ? `${range.machineKey}|${range.sectionKey}` : range.machineKey;
        const rangeKey = `${rangeGroupKey}|${range.rangeIndex}`;
        const count = rangeCounters.get(rangeKey) || 0;
        if (count === 0) {
            warnings.push(`No matching A/a equipment was numbered for ${range.sectionLabel} ${range.rangeLabel}.`);
        }
    }
    for (const [sectionKey, candidateCount] of sectionCandidateTotals.entries()) {
        const replacedCount = sectionReplacementTotals.get(sectionKey) || 0;
        if (replacedCount < candidateCount) {
            warnings.push(`${candidateCount - replacedCount} matching A/a equipment item(s) were not numbered for ${groupLabels.get(sectionKey) || sectionKey}.`);
        }
    }

    if (rows.length === 0) {
        rows.push({
            machine: "-",
            dbno: "-",
            oldId: "-",
            oldTxt: "-",
            newValue: "-",
            status: "no matches",
            ok: false
        });
    }

    return { settings, rows, replacements, warnings, errors: [] };
}

function findRangeForOffset(ranges, offset) {
    let remainingOffset = offset;
    for (const range of ranges) {
        if (range.limit === null) return range;
        if (remainingOffset < range.limit) return range;
        remainingOffset -= range.limit;
    }
    return null;
}

function applyMachinePlan(text, rawSettings = {}) {
    const plan = buildMachinePlan(text, rawSettings);
    if (plan.errors.length > 0 || plan.replacements.length === 0) {
        return {
            content: text,
            modified: false,
            count: 0,
            plan
        };
    }

    let output = String(text || "");
    for (let i = plan.replacements.length - 1; i >= 0; i--) {
        const replacement = plan.replacements[i];
        output = output.slice(0, replacement.start) + replacement.newTag + output.slice(replacement.end);
    }

    return {
        content: output,
        modified: output !== text,
        count: plan.replacements.length,
        plan
    };
}

function applyPlan(text, rawSettings) {
    const plan = buildPlan(text, rawSettings);
    if (plan.errors.length > 0 || plan.replacements.length === 0) {
        return {
            content: text,
            modified: false,
            count: 0,

        };
    }

    let output = String(text || "");
    for (let i = plan.replacements.length - 1; i >= 0; i--) {
        const replacement = plan.replacements[i];
        output = output.slice(0, replacement.start) + replacement.newTag + output.slice(replacement.end);
    }

    return {
        content: output,
        modified: output !== text,
        count: plan.replacements.length,
        plan
    };
}

function cleanExportLogValue(value) {
    return String(value ?? "").replace(/[\r\n\t]+/g, " ").trim();
}

function formatExportLogBoolean(value) {
    return value ? "yes" : "no";
}

function buildExportLog(details = {}) {
    const plan = details.plan || {};
    const settings = plan.settings || details.settings || {};
    const replacements = Array.isArray(plan.replacements) ? plan.replacements : [];
    const warnings = Array.isArray(plan.warnings) ? plan.warnings : [];
    const errors = Array.isArray(plan.errors) ? plan.errors : [];
    const exportedAt = cleanExportLogValue(details.exportedAt || new Date().toISOString());
    const sourceFileName = cleanExportLogValue(details.sourceFileName || "-");
    const outputFileName = cleanExportLogValue(details.outputFileName || "-");
    const startDbno = settings.useDbnoStart ? cleanExportLogValue(settings.startDbno) : "-";

    const lines = [
        "ETC Equipment ID Fixer Export Log",
        `Exported at: ${exportedAt}`,
        `Source file: ${sourceFileName || "-"}`,
        `Output file: ${outputFileName || "-"}`,
        "",
        "Settings",
        `Mode: ${cleanExportLogValue(settings.mode || "batch")}`,
        `Start number: ${cleanExportLogValue(settings.startNumber)}`,
        `Number step: ${cleanExportLogValue(settings.numberStep)}`,
        `Quantity requested: ${cleanExportLogValue(settings.quantity)}`,
        `Use dbno start filter: ${formatExportLogBoolean(settings.useDbnoStart)}`,
        `Start dbno: ${startDbno}`,
        `Only replace id/txt with A/a: ${formatExportLogBoolean(settings.onlyA)}`,
        `Only type = Messpunkt: ${formatExportLogBoolean(settings.onlyMesspunkt)}`,
        "",
        "Replacements",
        `Count: ${replacements.length}`
    ];

    if (replacements.length > 0) {
        lines.push("");
        lines.push(["#", "machine", "section", "range", "dbno", "old id", "old txt", "new id", "new txt"].join("\t"));
        replacements.forEach((replacement, index) => {
            const row = replacement.row || {};
            const newValue = cleanExportLogValue(row.newValue);
            lines.push([
                index + 1,
                cleanExportLogValue(row.machine),
                cleanExportLogValue(row.section),
                cleanExportLogValue(row.range),
                cleanExportLogValue(row.dbno),
                cleanExportLogValue(row.oldId),
                cleanExportLogValue(row.oldTxt),
                newValue,
                newValue
            ].join("\t"));
        });
    }

    if (warnings.length > 0) {
        lines.push("");
        lines.push("Warnings");
        warnings.forEach((warning, index) => {
            lines.push(`${index + 1}. ${cleanExportLogValue(warning)}`);
        });
    }

    if (errors.length > 0) {
        lines.push("");
        lines.push("Errors");
        errors.forEach((error, index) => {
            lines.push(`${index + 1}. ${cleanExportLogValue(error)}`);
        });
    }

    return `${lines.join("\n")}\n`;
}

        globalKeys: new Set(),
        machineCounts: new Map()
    };
    const replacements = Array.isArray(lastAppliedPlan?.replacements) ? lastAppliedPlan.replacements : [];
    for (const replacement of replacements) {
        const row = replacement.row || {};
        const dbno = String(row.dbno || "");
        const newValue = String(row.newValue || "");
        if (!dbno || !newValue) continue;
        if (row.sectionKey) {
            lookup.itemKeys.add(`${row.sectionKey}|${dbno}|${newValue}`);
        } else {
            lookup.globalKeys.add(`${dbno}|${newValue}`);
        }
        if (row.machineKey) {
            lookup.machineCounts.set(row.machineKey, (lookup.machineCounts.get(row.machineKey) || 0) + 1);
        }
    }
    return lookup;
}

function wasEquipmentReplaced(lookup, sectionKey, equipment) {
    const dbno = String(equipment.dbno || "");
    if (!dbno) return false;
    const values = [equipment.id, equipment.txt].filter(Boolean).map(String);
    return values.some(value =>
        lookup.itemKeys.has(`${sectionKey}|${dbno}|${value}`) ||
        lookup.globalKeys.has(`${dbno}|${value}`)
    );
}

async function handleFileSelect(event) {
    const file = event.target.files && event.target.files[0];
    clearLog();
    lastPlan = null;
    lastAppliedPlan = null;
    hasChanges = false;
    currentContent = "";
    originalContent = "";
    loadedFile = null;
    clearDownloadLinks();
    diagramExpansionState.clear();
    byId("downloadBtn").disabled = true;

    if (!file) {
        renderFileSummary();
        renderRunSummary("No file selected.");
        return;
    }
    if (!isSupportedFile(file)) {
        logError(`Unsupported file extension: ${file.name}`);
        renderRunSummary("File rejected.");
        return;
    }
    if (file.size > MAX_INPUT_FILE_SIZE_BYTES) {
        logError(`File is too large: ${formatBytes(file.size)}.`);
        renderRunSummary("File rejected.");
        return;
    }

    setBusy(true);
    try {
        originalContent = await readFileAsText(file);
        currentContent = originalContent;

        renderMachineRanges();
        renderMachineDiagram();
        renderFileSummary();

    }

function getMachineRangeSettings() {
    const groups = Array.from(document.querySelectorAll("#machineBody .range-group[data-section-key][data-range-index]"));
    return groups.map(group => ({
        machineKey: group.dataset.machineKey,
        machineLabel: group.dataset.machineLabel,
        sectionKey: group.dataset.sectionKey,
        sectionLabel: group.dataset.sectionLabel,
        rangeIndex: group.dataset.rangeIndex,
        rangeLabel: group.dataset.rangeLabel,
        enabled: group.querySelector(".range-enabled")?.checked === true,
        limit: group.querySelector(".range-limit")?.value || "",
        startNumber: group.querySelector(".range-start")?.value || "",
        numberStep: group.querySelector(".range-step")?.value || DEFAULT_NUMBER_STEP
    }));
}

function parsePositiveIntegerInput(value) {
    const raw = String(value || "").trim();
    if (!/^\d+$/.test(raw)) return null;
    const parsed = Number(raw);
    return Number.isSafeInteger(parsed) && parsed > 0 ? parsed : null;
}

function computeRangePreview(startNumber, count, step) {
    if (count < 1) return "-";
    const start = String(startNumber || "").trim();
    const parsedStep = Number(String(step || "").trim());
    if (!/^\d+$/.test(start) || !Number.isSafeInteger(parsedStep) || parsedStep < 1) return "-";
    const last = incrementDigitString(start, count - 1, parsedStep);
    return count === 1 ? start : `${start} - ${last}`;
}

function computeRangeCounts(totalCount, entries) {
    let remaining = totalCount;
    return entries.map(entry => {
        if (remaining < 1) return 0;
        const limit = parsePositiveIntegerInput(entry.limit);
        const count = limit === null ? remaining : Math.min(limit, remaining);
        remaining -= count;
        return count;
    });
}

function getExistingMachineRangeValues() {
    const values = new Map();
    for (const row of Array.from(document.querySelectorAll("#machineBody tr.machine-section-row[data-section-key]"))) {
        const sectionKey = row.dataset.sectionKey;
        if (!values.has(sectionKey)) {
            values.set(sectionKey, {
                groupCount: 1,
                ranges: new Map()
            });
        }
        const section = values.get(sectionKey);
        const groupCountInput = row.querySelector(".range-group-count");
        if (groupCountInput) {
            section.groupCount = parsePositiveIntegerInput(groupCountInput.value) || 1;
        }
    }
    for (const group of Array.from(document.querySelectorAll("#machineBody .range-group[data-section-key][data-range-index]"))) {
        const sectionKey = group.dataset.sectionKey;
        if (!values.has(sectionKey)) {
            values.set(sectionKey, {
                groupCount: 1,
                ranges: new Map()
            });
        }
        const section = values.get(sectionKey);
        const rangeIndex = Number(group.dataset.rangeIndex || "0");
        section.ranges.set(rangeIndex, {
            enabled: group.querySelector(".range-enabled")?.checked === true,
            limit: group.querySelector(".range-limit")?.value || "",
            startNumber: group.querySelector(".range-start")?.value || "",
            numberStep: group.querySelector(".range-step")?.value || DEFAULT_NUMBER_STEP
        });
    }
    return values;
}

    input.value = value || "";
    field.appendChild(label);
    field.appendChild(input);
    return { field, input };
}

function createRangeGroupElement(details) {
    const group = document.createElement("div");
    group.className = "range-group";
    group.dataset.machineKey = details.machine.key;
    group.dataset.machineLabel = getMachineTitle(details.machine);
    group.dataset.sectionKey = details.section.key;
    group.dataset.sectionLabel = getSectionTitle(details.section);
    group.dataset.rangeIndex = String(details.index);
    group.dataset.rangeLabel = details.rangeLabel;
    group.dataset.candidateCount = String(details.totalCount);

    const useField = document.createElement("label");
    useField.className = "range-use";
    const enabledInput = document.createElement("input");
    enabledInput.type = "checkbox";
    enabledInput.className = "range-enabled";
    enabledInput.checked = details.entry.enabled && details.rangeCount > 0;
    enabledInput.disabled = details.rangeCount === 0;
    useField.appendChild(enabledInput);
    group.appendChild(useField);

    const limit = createRangeField("Count", "range-limit", details.entry.limit, "remaining");
    limit.input.disabled = details.rangeCount === 0;
    group.appendChild(limit.field);

    const start = createRangeField("Start", "range-start", details.rangeCount > 0 ? details.entry.startNumber : "");
    start.input.disabled = details.rangeCount === 0;
    group.appendChild(start.field);

    const step = createRangeField("Step", "range-step", details.entry.numberStep || DEFAULT_NUMBER_STEP);
    step.input.disabled = details.rangeCount === 0;
    group.appendChild(step.field);

    const previewField = document.createElement("div");
    previewField.className = "range-field range-preview-field";
    const previewLabel = document.createElement("label");
    previewLabel.textContent = details.rangeLabel;
    const preview = document.createElement("div");
    preview.className = "machine-range-preview range-preview";
    previewField.appendChild(previewLabel);
    previewField.appendChild(preview);
    group.appendChild(previewField);

    return group;
}

function updateMachineRangeRows() {
    const rowsBySection = new Map();
    for (const group of Array.from(document.querySelectorAll("#machineBody .range-group[data-section-key][data-range-index]"))) {
        const sectionKey = group.dataset.sectionKey;
        if (!rowsBySection.has(sectionKey)) rowsBySection.set(sectionKey, []);
        rowsBySection.get(sectionKey).push(group);
    }

    for (const groups of rowsBySection.values()) {
        groups.sort((left, right) => Number(left.dataset.rangeIndex) - Number(right.dataset.rangeIndex));
        const totalCount = Number(groups[0]?.dataset.candidateCount || "0");
        const entries = groups.map(group => ({
            limit: group.querySelector(".range-limit")?.value || ""
        }));
        const counts = computeRangeCounts(totalCount, entries);
        groups.forEach((group, index) => {
            const count = counts[index] || 0;
            const start = group.querySelector(".range-start")?.value || "";
            const step = group.querySelector(".range-step")?.value || DEFAULT_NUMBER_STEP;
            const preview = group.querySelector(".machine-range-preview");
            if (preview) preview.textContent = computeRangePreview(start, count, step);

            const disabled = count === 0;
            const enabledInput = group.querySelector(".range-enabled");
            if (enabledInput) {
                const wasDisabled = enabledInput.disabled;
                enabledInput.disabled = disabled;
                if (disabled) enabledInput.checked = false;
                if (!disabled && wasDisabled) enabledInput.checked = true;
            }
            group.querySelectorAll(".range-limit, .range-start, .range-step").forEach(input => {
                input.disabled = disabled;
            });
        });
    }
}

function renderMachineRanges(options = {}) {
    const summaryEl = byId("machineSummary");
    const body = byId("machineBody");
    const existingValues = getExistingMachineRangeValues();
    body.textContent = "";

    if (!currentContent || !loadedFile) {
        summaryEl.textContent = "No file selected.";
        const tr = document.createElement("tr");
        const td = document.createElement("td");
        td.colSpan = 3;
        td.textContent = "No machine data.";
        tr.appendChild(td);
        body.appendChild(tr);
        return;
    }

    const allSummaries = getMachineSectionSummaries(currentContent, {
        onlyA: byId("onlyA").checked,
        onlyMesspunkt: byId("onlyMesspunkt").checked,
        numberStep: byId("numberStep").value
    });
    const summaries = allSummaries.filter(summary => summary.candidates > 0);
    const machineCount = new Set(allSummaries.map(summary => summary.machine.key)).size;
    const totalCandidates = summaries.reduce((sum, summary) => sum + summary.candidates, 0);
    summaryEl.textContent = `Machines: ${machineCount} | Sections with matches: ${summaries.length} | Matches to replace: ${totalCandidates}`;

    if (summaries.length === 0) {
        const tr = document.createElement("tr");
        const td = document.createElement("td");
        td.colSpan = 3;
        td.textContent = "No matching A/a equipment was found in CIRCUIT sections.";
        tr.appendChild(td);
        body.appendChild(tr);
        return;
    }

    const globalStart = byId("startNumber").value.trim();
    const rawGlobalStep = byId("numberStep").value.trim();
    const canAutoFill = options.forceFill === true && /^\d+$/.test(globalStart) && /^\d+$/.test(rawGlobalStep);
    const globalStep = canAutoFill ? Number(rawGlobalStep) : null;
    let fillCursor = canAutoFill ? globalStart : "";

    for (const summary of summaries) {
        const machine = summary.machine;
        const section = summary.section;
        const count = summary.candidates;
        const existing = existingValues.get(section.key);
        const groupCount = Math.min(MAX_RANGE_GROUPS, Math.max(1, existing?.groupCount || 1));
        const entries = [];
        for (let index = 0; index < groupCount; index++) {
            const existingRange = existing?.ranges.get(index);
            entries.push({
                enabled: existingRange?.enabled !== false,
                limit: existingRange?.limit || "",
                startNumber: existingRange?.startNumber || "",
                numberStep: existingRange?.numberStep || byId("numberStep").value || DEFAULT_NUMBER_STEP
            });
        }
        const counts = computeRangeCounts(count, entries);
        if (canAutoFill) {
            for (let index = 0; index < entries.length; index++) {
                if (counts[index] > 0) {
                    entries[index].startNumber = fillCursor;
                    fillCursor = incrementDigitString(fillCursor, counts[index], globalStep) || fillCursor;
                }
            }
        }

        const sectionRow = document.createElement("tr");
        sectionRow.className = "machine-section-row";
        sectionRow.dataset.sectionKey = section.key;

        const machineTd = document.createElement("td");
        const name = document.createElement("span");
        name.className = "machine-name";
        name.textContent = machine.id || "Unnamed BUILDING";
        const meta = document.createElement("span");
        meta.className = "machine-meta";
        meta.textContent = [machine.txt && machine.txt !== machine.id ? machine.txt : "", machine.dbno ? `dbno ${machine.dbno}` : "", getSectionTitle(section)].filter(Boolean).join(" | ");
        machineTd.appendChild(name);
        if (meta.textContent) machineTd.appendChild(meta);
        sectionRow.appendChild(machineTd);

        const countTd = document.createElement("td");
        countTd.textContent = String(count);
        sectionRow.appendChild(countTd);

        const groupsTd = document.createElement("td");
        const groupInput = document.createElement("input");
        groupInput.type = "text";
        groupInput.className = "range-group-count";
        groupInput.inputMode = "numeric";
        groupInput.autocomplete = "off";
        groupInput.spellcheck = false;
        groupInput.value = String(groupCount);
        groupsTd.appendChild(groupInput);
        sectionRow.appendChild(groupsTd);
        body.appendChild(sectionRow);

        const groupsRow = document.createElement("tr");
        groupsRow.className = "machine-groups-row";
        groupsRow.dataset.sectionKey = section.key;
        const groupsCell = document.createElement("td");
        groupsCell.colSpan = 3;
        const groupWrap = document.createElement("div");
        groupWrap.className = "range-groups";

        for (let index = 0; index < entries.length; index++) {
            const entry = entries[index];
            const rangeCount = counts[index] || 0;
            const rangeLabel = `Group ${index + 1}`;
            groupWrap.appendChild(createRangeGroupElement({
                machine,
                section,
                index,
                rangeLabel,
                totalCount: count,
                rangeCount,
                entry
            }));
        }
        groupsCell.appendChild(groupWrap);
        groupsRow.appendChild(groupsCell);
        body.appendChild(groupsRow);
    }

    body.querySelectorAll(".range-limit, .range-start, .range-step, .range-enabled").forEach(input => {
        input.addEventListener("input", updateMachineRangeRows);
        input.addEventListener("change", updateMachineRangeRows);
    });
    body.querySelectorAll(".range-group-count").forEach(input => {
        input.addEventListener("input", scheduleMachineRangeRender);
        input.addEventListener("change", renderMachineRangesNow);
    });
    updateMachineRangeRows();
}

function refreshGroupedViews(options = {}) {
    renderMachineRanges(options);
    renderMachineDiagram();
    renderFileSummary();
}

function getFreshSettingsForRun() {
    if (currentMode() === "machine" && currentContent && loadedFile) {
        renderMachineRangesNow();
    }
    return getSettings();
}

function previewChanges() {
    if (!loadedFile) {
        logWarn("Select a file first.");
        return;
    }
    if (!validateOutputSuffix()) return;

    const settings = getFreshSettingsForRun();
    const plan = settings.mode === "machine" ? buildMachinePlan(currentContent, settings) : buildPlan(currentContent, settings);
    lastPlan = plan;
    if (plan.errors.length > 0) {
        renderPreview(plan.errors.map(message => ({
            dbno: "-",
            oldId: "-",
            oldTxt: "-",
            newValue: "-",
            status: message,
            ok: false
        })));
        renderRunSummary("Check the fields.");
        plan.errors.forEach(logError);
        return;
    }

    renderPreview(plan.rows);
    renderRunSummary(`Replacements found: ${plan.replacements.length}.`);
    if (plan.replacements.length > 0) {
        logOk(`Preview: ${plan.replacements.length} replacements.`);
        plan.warnings.forEach(logWarn);
    } else {
        logWarn("Preview: no replacements.");
    }
}

function applyChanges() {
    if (!loadedFile) {
        logWarn("Select a file first.");
        return;
    }
    if (!validateOutputSuffix()) return;

    const settings = getFreshSettingsForRun();
    const result = settings.mode === "machine" ? applyMachinePlan(currentContent, settings) : applyPlan(currentContent, settings);
    lastPlan = result.plan;
    renderPreview(result.plan.rows);

    if (result.plan.errors.length > 0) {
        renderRunSummary("Check the fields.");
        result.plan.errors.forEach(logError);
        return;
    }

    if (!result.modified) {
        renderRunSummary("No changes.");
        logWarn("Replacement was not applied: no matches.");
        return;
    }

    currentContent = result.content;
    lastAppliedPlan = result.plan;
    hasChanges = true;
    clearDownloadLinks();
    diagramExpansionState.clear();
    byId("downloadBtn").disabled = false;
    refreshGroupedViews();
    renderRunSummary(`Done: ${result.count} replacements.`);
    logOk(`Replaced: ${result.count}`);
    result.plan.warnings.forEach(logWarn);
    for (const replacement of result.plan.replacements) {
        const groupLabel = formatPreviewGroup(replacement.row);
        const groupPrefix = groupLabel === "-" ? "" : `${groupLabel} | `;
        log(`${groupPrefix}dbno ${replacement.row.dbno}: ${replacement.row.oldId}/${replacement.row.oldTxt} -> ${replacement.row.newValue}`);
    }
}

function downloadCurrentFile() {
    if (!loadedFile || !currentContent) {
        logWarn("No file to download.");
        return;
    }
    if (!validateOutputSuffix()) return;

    const suffix = getSuffix();
    const outputName = makeDownloadName(loadedFile.name, suffix);
    const exportLogName = makeExportLogName(loadedFile.name, suffix);
    const exportLog = buildExportLog({
        exportedAt: new Date().toISOString(),
        sourceFileName: loadedFile.name,
        outputFileName: outputName,
        plan: lastAppliedPlan || lastPlan
    });

    const links = renderDownloadLinks([
        { label: `ETC file: ${outputName}`, fileName: outputName, content: currentContent },
        { label: `Export log: ${exportLogName}`, fileName: exportLogName, content: exportLog }
    ]);
    triggerDownloadLinks(links);
    logOk(`Download links ready: ${outputName}, ${exportLogName}`);
    logWarn("If the browser cancels or blocks a save dialog, use the ETC file and Export log links.");
}

document.addEventListener("DOMContentLoaded", () => {
    byId("fileInput").addEventListener("change", handleFileSelect);
    byId("previewBtn").addEventListener("click", previewChanges);
    byId("applyBtn").addEventListener("click", applyChanges);
    byId("downloadBtn").addEventListener("click", downloadCurrentFile);
    byId("diagramTab").addEventListener("click", () => setReviewTab("diagramPanel"));
    byId("previewTab").addEventListener("click", () => setReviewTab("previewPanel"));
    document.querySelectorAll('input[name="layoutMode"]').forEach(input => {
        input.addEventListener("change", () => setLayoutMode(input.value));
    });
    byId("onlyA").addEventListener("change", refreshGroupedViews);
    byId("onlyMesspunkt").addEventListener("change", () => {
        refreshGroupedViews();
    });
    byId("numberStep").addEventListener("change", () => refreshGroupedViews({ forceFill: true }));
    byId("startNumber").addEventListener("change", () => refreshGroupedViews({ forceFill: true }));
    byId("suffix").addEventListener("input", clearDownloadLinks);
    byId("useDbnoStart").addEventListener("change", updateModeUi);
    byId("useMachineRanges").addEventListener("change", updateModeUi);
    window.addEventListener("pagehide", clearDownloadLinks);
    setLayoutMode(getDefaultLayoutMode());
    updateModeUi();
    renderMachineRanges();
    renderMachineDiagram();
    renderFileSummary();
});
    </script>
</body>
</html>
