<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: blob:; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'">
    <title>ETC Equipment ID Fixer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-layout-mode="phone">
    <main class="container">
        <header>
            <h1>ETC Equipment ID Fixer</h1>
            <p>ELECTRICALEQUIPMENT id/txt</p>
            <div class="layout-toggle segmented" role="radiogroup" aria-label="Layout mode">
                <label>
                    <input type="radio" name="layoutMode" value="phone" checked>
                    <span>Phone</span>
                </label>
                <label>
                    <input type="radio" name="layoutMode" value="laptop">
                    <span>Laptop</span>
                </label>
            </div>
        </header>

        <section class="card">
            <h2>1. File</h2>
            <div class="form-group">
                <label for="fileInput">ETC file</label>
                <input type="file" id="fileInput" accept=".etc,.xml,.txt">
            </div>
            <div id="fileSummary" class="summary-box" aria-live="polite">No file selected.</div>
        </section>

        <section class="card">
            <h2>2. Replacement</h2>

            <input id="startNumber" type="hidden">
            <input id="numberStep" type="hidden" value="1">
            <input id="quantity" type="hidden">
            <input id="suffix" type="hidden" value="_fixed">
            <input id="useDbnoStart" type="checkbox" class="hidden">
            <input id="startDbno" type="text" class="hidden" inputmode="numeric" autocomplete="off" spellcheck="false">
            <input id="useMachineRanges" type="checkbox" class="hidden" checked>

            <div class="switch-row">
                <label>
                    <input type="checkbox" id="onlyA" checked>
                    <span>Only replace id/txt with A/a</span>
                </label>
                <label>
                    <input type="checkbox" id="onlyMesspunkt" checked>
                    <span>Only type = Messpunkt</span>
                </label>
            </div>

            <div id="machineRangesPanel">
                <h3>Machine ranges</h3>
                <div id="machineSummary" class="summary-box" aria-live="polite">No file selected.</div>
                <div class="table-wrap">
                    <table class="machine-table">
                        <thead>
                            <tr>
                                <th>Machine / section</th>
                                <th>Matches</th>
                                <th>Groups</th>
                            </tr>
                        </thead>
                        <tbody id="machineBody">
                            <tr><td colspan="3">No machine data.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="runSummary" class="summary-box" aria-live="polite">Ready to preview.</div>

            <div class="action-row">
                <button id="previewBtn" type="button">Preview</button>
                <button id="applyBtn" type="button">Replace</button>
                <button id="downloadBtn" type="button" disabled>Download + Log</button>
            </div>
            <div id="downloadLinksPanel" class="download-links-panel hidden" aria-live="polite">
                <div id="downloadLinks" class="download-links"></div>
            </div>
        </section>

        <section class="card">
            <h2>3. Review</h2>
            <div class="tabs" role="tablist" aria-label="Review views">
                <button id="diagramTab" class="tab-button active" type="button" role="tab" aria-selected="true" aria-controls="diagramPanel">Machine Diagram</button>
                <button id="previewTab" class="tab-button" type="button" role="tab" aria-selected="false" aria-controls="previewPanel">Preview Table</button>
            </div>

            <div id="diagramPanel" class="tab-panel" role="tabpanel" aria-labelledby="diagramTab">
                <div id="diagramSummary" class="summary-box" aria-live="polite">No file selected.</div>
                <div id="machineDiagram" class="diagram-grid" aria-live="polite"></div>
            </div>

            <div id="previewPanel" class="tab-panel hidden" role="tabpanel" aria-labelledby="previewTab">
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>dbno</th>
                                <th>machine / section</th>
                                <th>id</th>
                                <th>txt</th>
                                <th>new</th>
                                <th>status</th>
                            </tr>
                        </thead>
                        <tbody id="previewBody">
                            <tr><td colspan="6">No data.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <section class="card">
            <h2>Log</h2>
            <div id="log" aria-live="polite"></div>
        </section>
    </main>

    <script src="js/utils.js"></script>
    <script src="js/etc-fixer.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
